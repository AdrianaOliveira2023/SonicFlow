<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>

<body>

  <header>

      <p>Artist: SoundReality</p>
      <audio src="tunes/soundreality-birds-forest-nature-445379.mp3" loop controls></audio>

    <div class="card">
      <h2>Calming Rain</h2>
      <p>Artist: Liecio</p>
      <audio src="tunes/liecio-calming-rain-257596.mp3" loop controls></audio>
    </div>

    <div class="card">
      <h2>Rock Cinematic</h2>
      <p>Artist: LordSonny</p>
      <audio src="tunes/lordsonny-rock-cinematic-161648.mp3" loop controls></audio>
    </div>

    <div class="card">
      <h2>Police Operation Siren</h2>
      <p>Artist: SoundReality</p>
      <audio src="tunes/soundreality-police-operation-siren-144229.mp3" loop controls></audio>
    </div>

    <div class="card">
      <h2>Cinematic Intro</h2>
      <p>Artist: FreeSound Community</p>
      <audio src="tunes/freesound_community-cinematic-intro-6097.mp3" loop controls></audio>
    </div>

    <div class="card">
      <h2>Like and Subscribe</h2>
      <p>Artist: Delon_Boomkin</p>
      <audio src="tunes/delon_boomkin-like-and-subscribe-438911.mp3" loop controls></audio>

</html>
